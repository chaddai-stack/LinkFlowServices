spring:
  application:
    name: linkflow-service

  datasource:
    url: jdbc:postgresql://localhost:5432/appdb
    username: postgres
    password: devpass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  public-base-url: ${LINKFLOW_PUBLIC_BASE_URL:http://localhost:8080}
  storage:
    qrcode:
      s3:
        enabled: ${LINKFLOW_QR_S3_ENABLED:false}
        bucket: ${LINKFLOW_QR_S3_BUCKET:linkflow-qrcodes}
        region: ${LINKFLOW_QR_S3_REGION:us-west-1}
        access-key: ${AWS_ACCESS_KEY_ID:}
        secret-key: ${AWS_SECRET_ACCESS_KEY:}
        endpoint: ${LINKFLOW_QR_S3_ENDPOINT:}
        public-base-url: ${LINKFLOW_QR_S3_PUBLIC_BASE_URL:}
        prefix: ${LINKFLOW_QR_S3_PREFIX:qrcodes}
  ai:
    backhalf:
      enabled: ${LINKFLOW_BACKHALF_LLM_ENABLED:false}
      endpoint: ${LINKFLOW_BACKHALF_LLM_ENDPOINT:https://api.openai.com/v1/chat/completions}
      api-key: ${OPENAI_API_KEY:}
      model: ${LINKFLOW_BACKHALF_LLM_MODEL:gpt-4o-mini}
    huggingface:
      enabled: ${LINKFLOW_HF_ENABLED:false}
      zero-shot-endpoint: ${LINKFLOW_HF_ZERO_SHOT_ENDPOINT:https://router.huggingface.co/hf-inference/models/facebook/bart-large-mnli}
      api-key: ${HF_TOKEN:}
      timeout-ms: ${LINKFLOW_HF_TIMEOUT_MS:3000}
  security:
    jwt:
      issuer: linkflow-service
      secret: ${LINKFLOW_JWT_SECRET:linkflow-development-jwt-secret-key-32b}
      access-token-ttl: PT1H
      refresh-token-ttl: P7D
