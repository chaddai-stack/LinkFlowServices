spring:
  application:
    name: linkflow-service

  datasource:
    url: jdbc:postgresql://localhost:5432/appdb_linkflow
    username: postgres
    password: devpass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  public-base-url: http://localhost:8080
  security:
    jwt:
      issuer: linkflow-service
      secret: ${LINKFLOW_JWT_SECRET:linkflow-development-jwt-secret-key-32b}
      access-token-ttl: PT1H
      refresh-token-ttl: P7D
